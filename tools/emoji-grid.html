}

// Local image manifest for the "I'm feelin' lucky" button.
// Files live in ./lucy/  — list every .JPG file in that folder here.
const LUCY_IMAGES = [

async function fetchLucy() {
  // Fisher-Yates-ish shuffle, then take 10.
  const pool = LUCY_IMAGES.slice();
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const picks = pool.slice(0, 10);
  // Pad in case the manifest has fewer than 10 entries.
  while (picks.length < 10 && pool.length > 0) picks.push(pool[picks.length % pool.length]);
  // Downscale each to ~900px and return as data URLs. Camera-roll JPGs are
  // often 4000×3000+, which blows mobile Safari's canvas-size cap when
  // html-to-image tries to export 10 of them at 2× pixelRatio (the export
  // comes back blank). Pre-shrinking makes both render and export reliable.
  const paths = picks.map((name) => 'lucy/' + name);
  return Promise.all(paths.map((p) => downscaleToDataURL(p, 900)));
}

function downscaleToDataURL(url, maxDim) {
  return new Promise((resolve) => {
    const img = new Image();
    let done = false;
    const finish = (out) => { if (done) return; done = true; resolve(out); };
    img.onload = () => {
      try {
        const w0 = img.naturalWidth || 1;
        const h0 = img.naturalHeight || 1;
        const scale = Math.min(1, maxDim / Math.max(w0, h0));
        const w = Math.max(1, Math.round(w0 * scale));
        const h = Math.max(1, Math.round(h0 * scale));
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        finish(c.toDataURL('image/jpeg', 0.85));
      } catch (e) {
        finish(url); // fallback to raw path
      }
    };
    img.onerror = () => finish(url);
    // Safety timeout — don't hang forever on a bad file.
    setTimeout(() => finish(url), 10000);
    img.src = url;
  });
}

// Probe each image for its natural aspect ratio so we can avoid stacking
// two portrait shots in the same column (that makes the grid look "tall").
function probeAspect(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.referrerPolicy = 'no-referrer';
    let done = false;
    const finish = (w, h) => {
      if (done) return;
      done = true;
      resolve({ url, w: w || 1, h: h || 1, ratio: (h || 1) / (w || 1) });
    };
    img.onload = () => finish(img.naturalWidth, img.naturalHeight);
    img.onerror = () => finish(1, 1);
    // Safety timeout — never hang the UI on a slow image.
    setTimeout(() => finish(img.naturalWidth, img.naturalHeight), 6000);
    img.src = url;
  });
}

// Returns a re-ordered array of 10 urls. Layout is 5 columns × 2 rows
// (index i sits in column i%5, row floor(i/5)). We try to ensure that
// no column has two portrait images stacked.
function arrangeNoStackedPortraits(probes) {
  const PORTRAIT_THRESHOLD = 1.15; // h/w > 1.15 ⇒ portrait
  const portraits = probes.filter((p) => p.ratio > PORTRAIT_THRESHOLD);
  const others = probes.filter((p) => p.ratio <= PORTRAIT_THRESHOLD);
  const P = portraits.length;
  const result = new Array(10);

  // Evenly-spread column picks for sets of 0..5 items.
  const SPREAD = {
    0: [],
    1: [2],
    2: [1, 3],
    3: [0, 2, 4],
    4: [0, 1, 3, 4],
    5: [0, 1, 2, 3, 4]
  };

  if (P <= 5) {
    // Put each portrait in its own column (row 0) — fill remaining slots
    // (row 1 of those columns + all of the non-portrait columns) with landscapes.
    const portraitCols = SPREAD[P];
    const portraitColSet = new Set(portraitCols);
    let pi = 0, li = 0;
    for (let col = 0; col < 5; col++) {
      if (portraitColSet.has(col)) {
        result[col] = portraits[pi++];
        result[5 + col] = others[li++];
      } else {
        result[col] = others[li++];
        result[5 + col] = others[li++];
      }
    }
  } else {
    // More than 5 portraits — at least (P - 5) columns will unavoidably
    // have two portraits. Minimize: put all portraits in row 0, then put
    // landscapes in row 1 spread across as many columns as possible.
    let pi = 0, li = 0;
    const L = others.length; // 10 - P, between 0 and 4
    const landscapeRow1Cols = new Set(SPREAD[L]);
    for (let col = 0; col < 5; col++) result[col] = portraits[pi++];
    for (let col = 0; col < 5; col++) {
      result[5 + col] = landscapeRow1Cols.has(col)
        ? others[li++]
        : portraits[pi++];
    }
  }

  // Defensive: fill any holes (e.g. if an array ran short) with leftovers.
  const flat = [...portraits, ...others];
  let fi = 0;
  for (let i = 0; i < 10; i++) {
    if (!result[i]) {
      while (fi < flat.length && result.includes(flat[fi])) fi++;
      result[i] = flat[fi++] || probes[i % probes.length];
    }
  }

  return result.map((p) => p.url);
}

"M 7,11 C 6,5 11,3 16,3 L 85,4 C 91,3 96,7 95,13 L 96,86 C 97,92 92,96 86,96 L 14,97 C 7,97 3,93 4,87 Z",
"M 5,13 C 4,7 9,3 14,3 L 87,3 C 93,3 96,7 96,13 L 97,86 C 96,93 93,97 87,96 L 13,97 C 7,97 3,92 4,87 Z",
"M 4,12 C 4,6 8,3 14,4 L 86,3 C 93,4 97,8 96,14 L 97,87 C 96,93 92,97 86,96 L 13,97 C 7,96 4,92 4,86 Z",
"M 6,12 C 5,6 10,3 15,3 L 87,4 C 92,3 96,8 96,13 L 97,87 C 97,92 93,97 87,96 L 14,97 C 8,97 4,92 5,86 Z",
"M 5,11 C 4,5 9,3 13,3 L 88,3 C 94,3 97,8 96,14 L 96,86 C 97,93 92,97 87,96 L 14,97 C 7,98 3,93 5,86 Z",
"M 4,12 C 4,7 8,3 14,3 L 87,3 C 94,4 96,8 95,14 L 97,87 C 96,93 93,97 86,96 L 13,97 C 7,97 3,93 4,87 Z"];

function roughMaskUrl(idx) {
  const path = ROUGH_PATHS[idx % ROUGH_PATHS.length];
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' preserveAspectRatio='none'><path d='${path}' fill='black'/></svg>`;
  return `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
}

// 9-slot word-cloud layout (percent of cloud box). Sizes vary, slight rotations.
const CLOUD_LAYOUT = [
{ left: 32, top: 18, size: 34, rot: -3 },
{ left: 4, top: 4, size: 22, rot: -6 },
{ left: 72, top: 8, size: 24, rot: 4 },
{ left: 74, top: 46, size: 23, rot: -2 },
{ left: 4, top: 36, size: 20, rot: 3 },
{ left: 26, top: 62, size: 28, rot: 2 },
{ left: 60, top: 70, size: 24, rot: -4 },
{ left: 4, top: 74, size: 18, rot: 5 },
{ left: 84, top: 78, size: 16, rot: -3 }];


function CloudTile({ url, idx, mounted }) {
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {setLoaded(false);}, [url]);
  const style = {
    transitionDelay: idx * 40 + 'ms'
  };
  return (
    <div className={'cloud-tile' + (mounted ? ' in' : '')} style={style}>
      {!loaded && <div className="placeholder" />}
      {url &&
      <img
        src={url}
        alt=""
        onLoad={() => setLoaded(true)}
        onError={() => setLoaded(true)}
        className={loaded ? 'loaded' : ''}
        referrerPolicy="no-referrer"
        draggable={false} />

      }
    </div>);

}

function App() {
  const [urls, setUrls] = useState([]);
  const [lastSetId, setLastSetId] = useState(null);
  const [currentSet, setCurrentSet] = useState(SETS[0]);
  const [loading, setLoading] = useState(false);
  const [loadingSet, setLoadingSet] = useState(null);
  const [downloading, setDownloading] = useState(false);
  const [errorMsg, setErrorMsg] = useState(null);
  const [tilesIn, setTilesIn] = useState(false);
  const cloudRef = React.useRef(null);

  const pickRandomSet = useCallback((excludeId) => {
    const pool = excludeId ? SETS.filter((s) => s.id !== excludeId) : SETS;
    return pool[Math.floor(Math.random() * pool.length)];
  }, []);

  const fetchSet = useCallback(async (s) => {
    if (loading) return;
    setLoading(true);
    setLoadingSet(s);
    setErrorMsg(null);
    setTilesIn(false);
    try {
      const list = await s.fetch();
      const ten = list.slice(0, 10);
      while (ten.length < 10 && list.length > 0) ten.push(list[ten.length % list.length]);
      // Probe aspect ratios, then re-order so two portrait shots aren't
      // stacked in the same column.
      const probes = await Promise.all(ten.map(probeAspect));
      const arranged = arrangeNoStackedPortraits(probes);
      setUrls(arranged);
      setCurrentSet(s);
      setLastSetId(s.id);
      requestAnimationFrame(() => requestAnimationFrame(() => setTilesIn(true)));
    } catch (e) {
      console.warn('fetch failed', e);
      setErrorMsg('Could not fetch images. Try again?');
    } finally {
      setLoading(false);
      setLoadingSet(null);
    }
  }, [loading]);

  const generate = useCallback(() => {
    fetchSet(pickRandomSet(lastSetId));
  }, [fetchSet, pickRandomSet, lastSetId]);

  const lucky = useCallback(() => {
    fetchSet(LUCY_SET);
  }, [fetchSet]);

  const download = useCallback(async () => {
    if (!cloudRef.current || !window.htmlToImage) return;
    setDownloading(true);
    setErrorMsg(null);
    try {
      const dataUrl = await window.htmlToImage.toPng(cloudRef.current, {
        pixelRatio: 2,
        backgroundColor: null,
        style: { background: 'transparent' },
        cacheBust: true
      });
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `emoji-grid-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch (e) {
      console.warn('download failed', e);
      setErrorMsg('Could not export image (some sources block downloads). Try a different set.');
    } finally {
      setDownloading(false);
    }
  }, []);

  useEffect(() => {fetchSet(pickRandomSet(null)); /* eslint-disable-next-line */}, []);

  const placeholders = Array.from({ length: 10 }, () => null);
  const tiles = urls.length === 10 ? urls : placeholders;

  return (
    <div className="page">
      <div className="eyebrow">Service design tools for brave play</div>
      <h1 className="title">
        <span className="a">Emoji </span><span className="b">Grid</span>
      </h1>
      <p className="lede">
        A consistent opener for standups and check-ins that names uncertainty <span className="lede-emoji" aria-hidden="true">🫥</span>,
        fosters vulnerable conversation <span className="lede-emoji" aria-hidden="true">🥲</span>, and creates shared focus
        <span className="lede-emoji" aria-hidden="true">✨</span> — without anyone narrating their feelings aloud <span className="lede-emoji" aria-hidden="true">☁️</span>.
      </p>

      <div className="steps">
        <span className="step"><span className="num">1</span>Generate a grid</span>
        <span className="sep">→</span>
        <span className="step"><span className="num">2</span>Drop it on the board</span>
        <span className="sep">→</span>
        <span className="step"><span className="num">3</span>Team dot-votes their mood</span>
      </div>

      <div className="panel">
        <span className="diamond tl"></span>
        <span className="diamond tr"></span>
        <span className="diamond bl"></span>
        <span className="diamond br"></span>

        <div className="button-row">
          <div className="button-wrap">
            <button className="btn-primary" onClick={generate} disabled={loading}>
              {loading ? (loadingSet && loadingSet.loadingLabel) || 'Conjuring critters…' : 'Generate Grid'}
            </button>
          </div>
        </div>

        <div className="cloud-card" ref={cloudRef}>
          <div className="cloud">
            {[0, 1, 2, 3, 4].map((col) =>
            <div className="cloud-col" key={col}>
                {tiles.map((u, i) => i % 5 === col ?
              <CloudTile
                key={(u || 'p') + ':' + i}
                url={u}
                idx={i}
                mounted={tilesIn && !!u} /> :

              null)}
              </div>
            )}
          </div>
        </div>

        <div className="panel-actions">
          <button className="btn-outline" onClick={lucky} disabled={loading}>
            Hey, Lucy! I'm feelin' lucky.
          </button>
          <button className="btn-secondary" onClick={download} disabled={loading || downloading || urls.length !== 10}>
            {downloading ? 'Preparing…' : 'Download image ↓'}
          </button>
        </div>
      </div>

      <div className="footer-row">
        <span className="left"><span className="dot"></span> Team ritual · Ice breaker</span>
        <span className="right">Need a follow-up prompt? Try <a href="https://jamiemkwan.com/tools/spark-cards" target="_blank" rel="noopener">Spark Cards</a>.</span>
      </div>

      <div className="err-line">{errorMsg}</div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
